<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight 0425 | Turbo Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #00f3ff; --gold: #c5a059; --dark: #010208; --box-bg: rgba(0, 243, 255, 0.05); }
        body, html { margin: 0; padding: 0; background: var(--dark); color: #fff; font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh; }

        /* Background & Tilt Area */
        #sky-v9 { position: fixed; width: 120%; height: 120%; top: -10%; left: -10%; background: radial-gradient(circle at center, #0a1a2f 0%, #010208 100%); z-index: -2; transition: 0.1s ease-out; }
        .cloud { position: absolute; font-size: 80px; opacity: 0.1; animation: drift 20s linear infinite; }
        @keyframes drift { from { left: 110%; } to { left: -20%; } }

        /* HUD */
        .hud { position: fixed; top: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 100; color: var(--neon); font-size: 10px; font-weight: bold; }
        .progress-bar { position: fixed; top: 0; left: 0; width: 0%; height: 4px; background: var(--neon); box-shadow: 0 0 15px var(--neon); z-index: 101; transition: 0.8s; }

        section { height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 0 25px; text-align: center; }
        section.active { display: flex; }

        /* THE GIFT BOXES (COLORFUL & VISIBLE) */
        .gift-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 400px; margin-top: 30px; }
        .gift-box { 
            background: var(--box-bg); 
            border: 2px solid #333; 
            border-radius: 20px; 
            padding: 30px 0; 
            cursor: pointer; 
            transition: 0.3s; 
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .gift-box:hover { border-color: var(--neon); transform: scale(1.05); background: rgba(0, 243, 255, 0.15); }
        .gift-box.c1 { border-color: #ff3b3b; } /* Red */
        .gift-box.c2 { border-color: #00ff88; } /* Green */
        .gift-box.c3 { border-color: #ff00ff; } /* Pink */
        .gift-box.c4 { border-color: #ffcc00; } /* Yellow */
        
        .gift-box span { font-size: 45px; display: block; margin-bottom: 10px; }
        .gift-box label { font-family: 'Orbitron'; font-size: 10px; color: var(--gold); letter-spacing: 1px; }

        /* Task & Popup */
        #popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
        .card { background: #05080a; border: 2px solid var(--neon); padding: 40px; border-radius: 25px; text-align: center; width: 80%; max-width: 350px; }
        .input-field { background: none; border: none; border-bottom: 2px solid var(--gold); color: #fff; font-size: 1.5rem; text-align: center; width: 100%; margin: 20px 0; outline: none; }
        
        .btn { background: none; border: 1px solid var(--neon); color: var(--neon); padding: 12px 25px; font-family: 'Orbitron'; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="sky-v9"></div>
    <div class="hud">
        <span>ALT: <span id="alt">0</span> FT</span>
        <span>SPD: <span id="spd">0</span> KTS</span>
    </div>
    <div class="progress-bar" id="pb"></div>

    <section id="s0" class="active">
        <h1 style="color:var(--gold);">MISSION: 0425</h1>
        <p>Flight systems ready. Sensors require activation for Tilt-Control.</p>
        <button class="btn" onclick="startMission()">ACTIVATE & START</button>
    </section>

    <section id="s1">
        <div style="border: 2px solid var(--neon); padding: 10px; border-radius: 10px; margin-bottom: 20px;">
            <img src="photo1.jpg" style="width: 250px; border-radius: 5px;" onerror="this.parentElement.style.display='none'">
        </div>
        <p id="t1" style="min-height: 80px;"></p>
        <button class="btn" onclick="go(2, 35000, 850, 'Your Hot Wheels spark is my favorite story. Never change, Pilot.')">NEXT LOG</button>
    </section>

    <section id="s2">
        <h1 style="color:var(--gold);">THE HANGAR</h1>
        <div class="gift-container">
            <div class="gift-box c1" onclick="openTask('The RC Car')"><span>🏎️</span><label>UNIT 01</label></div>
            <div class="gift-box c2" onclick="openTask('Teddy & Rose')"><span>🧸</span><label>UNIT 02</label></div>
            <div class="gift-box c3" onclick="openTask('The Dress')"><span>👗</span><label>UNIT 03</label></div>
            <div class="gift-box c4" onclick="openTask('New Slippers')"><span>👡</span><label>UNIT 04</label></div>
        </div>
        <div id="final" style="display:none; margin-top: 30px; border: 2px dashed var(--gold); padding: 20px;">
            <h2 id="choice" style="color:var(--neon);"></h2>
            <p>Mission Successful. See you at the horizon! ✈️</p>
        </div>
    </section>

    <div id="popup">
        <div class="card">
            <h3 style="color:var(--gold);">ENCRYPTION</h3>
            <p style="font-size: 0.8rem;">"He has the key but never unlocks. Who is 'He'?"</p>
            <input type="text" id="ans" class="input-field" placeholder="???">
            <button class="btn" onclick="verify()">DECODE</button>
        </div>
    </div>

    <script>
        // TILT EFFECT SENSOR REQUEST
        function startMission() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                .then(response => {
                    if (response == 'granted') {
                        window.addEventListener('deviceorientation', handleTilt);
                    }
                });
            } else {
                window.addEventListener('deviceorientation', handleTilt);
            }
            go(1, 15000, 450, 'Watching you talk about aviation is where my sky begins.');
        }

        function handleTilt(e) {
            const sky = document.getElementById('sky-v9');
            const x = e.gamma / 4; // Left-Right tilt
            const y = e.beta / 4;  // Front-Back tilt
            sky.style.transform = `translate(${x}px, ${y}px)`;
        }

        // NAVIGATION
        function go(n, alt, spd, txt) {
            document.querySelector('section.active').classList.remove('active');
            document.getElementById(`s${n}`).classList.add('active');
            document.getElementById('alt').innerText = alt;
            document.getElementById('spd').innerText = spd;
            document.getElementById('pb').style.width = (n * 50) + "%";

            let i = 0;
            const target = document.getElementById(`t${n}`);
            if(target) {
                target.innerText = "";
                function type() {
                    if(i < txt.length) {
                        target.innerText += txt.charAt(i);
                        i++; setTimeout(type, 40);
                    }
                }
                type();
            }
        }

        let selected = "";
        function openTask(g) {
            selected = g;
            document.getElementById('popup').style.display = 'flex';
        }

        function verify() {
            const val = document.getElementById('ans').value.toLowerCase().trim();
            if(val === "hot wheels") {
                document.getElementById('popup').style.display = 'none';
                document.querySelector('.gift-container').style.display = 'none';
                document.getElementById('choice').innerText = "LOCKED: " + selected;
                document.getElementById('final').style.display = 'block';
            } else { alert("WRONG KEY!"); }
        }

        // Clouds
        const sky = document.getElementById('sky-v9');
        for(let i=0; i<10; i++) {
            let c = document.createElement('div');
            c.className = 'cloud'; c.innerText = '☁️';
            c.style.top = Math.random() * 80 + 'vh';
            c.style.animationDelay = Math.random() * 15 + 's';
            sky.appendChild(c);
        }
    </script>
</body>
</html>
