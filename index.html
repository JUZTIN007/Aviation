<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight 0425 | Absolute Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f3ff; --gold: #c5a059; --dark: #010208; }
        body, html { margin: 0; padding: 0; background: var(--dark); color: #fff; font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh; }
        #sky { position: fixed; width: 140%; height: 140%; top: -20%; left: -20%; background: radial-gradient(circle at center, #0a1a2f 0%, #010208 100%); z-index: -2; transition: 0.1s; }
        .hud { position: fixed; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 100; color: var(--neon); font-size: 10px; font-weight: bold; }
        .bar { position: fixed; top: 0; left: 0; width: 0%; height: 5px; background: var(--neon); box-shadow: 0 0 10px var(--neon); z-index: 101; transition: 1s; }
        section { height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 0 20px; text-align: center; }
        section.active { display: flex; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 400px; margin-top: 20px; }
        .box { background: rgba(255,255,255,0.05); border: 2px solid #444; border-radius: 15px; padding: 25px 0; cursor: pointer; transition: 0.3s; }
        .box:hover { border-color: var(--neon); transform: scale(1.05); }
        #reveal { display: none; margin-top: 20px; text-align: center; }
        .neon-frame { border: 4px solid var(--neon); border-radius: 15px; padding: 10px; background: #000; box-shadow: 0 0 50px var(--neon); }
        .neon-frame img { width: 280px; border-radius: 10px; display: block; }
        .btn { background: none; border: 1px solid var(--neon); color: var(--neon); padding: 10px 25px; font-family: 'Orbitron'; cursor: pointer; border-radius: 4px; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; align-items: center; justify-content: center; }
        .card { background: #05080a; border: 2px solid var(--neon); padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 320px; }
    </style>
</head>
<body>
    <div id="sky"></div>
    <div class="hud"><span>ALT: <span id="a">0</span> FT</span><span>SPD: <span id="s">0</span> KTS</span></div>
    <div class="bar" id="pb"></div>

    <section id="s0" class="active">
        <h1 style="color:var(--gold); font-family:'Orbitron'; letter-spacing: 5px;">FLIGHT 0425</h1>
        <p>Systems Locked. Authorize to Begin.</p>
        <button class="btn" onclick="start()">START MISSION</button>
    </section>

    <section id="s1">
        <h1 style="color:var(--gold); font-family:'Orbitron';">THE HANGAR</h1>
        <div class="grid" id="grid">
            <div class="box" onclick="ask('The RC Car', 'https://images.pexels.com/photos/1013427/pexels-photo-1013427.jpeg?auto=compress&cs=tinysrgb&w=600')"><span>🏎️</span><label style="font-size: 9px; color:var(--gold); display: block; margin-top: 10px;">UNIT 01</label></div>
            <div class="box" onclick="ask('Teddy & Rose', 'https://images.pexels.com/photos/4590400/pexels-photo-4590400.jpeg?auto=compress&cs=tinysrgb&w=600')"><span>🧸</span><label style="font-size: 9px; color:var(--gold); display: block; margin-top: 10px;">UNIT 02</label></div>
            <div class="box" onclick="ask('The Dress', 'https://images.pexels.com/photos/1755428/pexels-photo-1755428.jpeg?auto=compress&cs=tinysrgb&w=600')"><span>👗</span><label style="font-size: 9px; color:var(--gold); display: block; margin-top: 10px;">UNIT 03</label></div>
            <div class="box" onclick="ask('New Slippers', 'https://images.pexels.com/photos/5431626/pexels-photo-5431626.jpeg?auto=compress&cs=tinysrgb&w=600')"><span>👡</span><label style="font-size: 9px; color:var(--gold); display: block; margin-top: 10px;">UNIT 04</label></div>
        </div>
        <div id="reveal">
            <div class="neon-frame">
                <img id="fimg" src="" alt="Gift Visual">
                <h2 id="fname" style="color:var(--gold); font-family:'Orbitron'; font-size: 1.1rem; margin-top: 15px;"></h2>
            </div>
            <p style="margin-top: 15px; font-style: italic; font-size: 0.8rem;">"Happy Birthday Pilot! Mission Complete! ✈️"</p>
        </div>
    </section>

    <div id="overlay">
        <div class="card">
            <h3 style="color:var(--gold); font-family:'Orbitron';">AUTHENTICATE</h3>
            <p style="font-size: 0.8rem;">"He has the key but never unlocks his potential. Who is 'He'?"</p>
            <input type="text" id="ans" style="background:none; border:none; border-bottom:2px solid var(--gold); color:#fff; font-size:1.5rem; text-align:center; width:100%; margin:20px 0; outline:none;" placeholder="...">
            <button class="btn" onclick="verify()">AUTHORIZE</button>
        </div>
    </div>

    <script>
        function start() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') window.addEventListener('deviceorientation', e => {
                        document.getElementById('sky').style.transform = `translate(${e.gamma/5}px, ${e.beta/5}px)`;
                    });
                });
            } else {
                window.addEventListener('deviceorientation', e => {
                    document.getElementById('sky').style.transform = `translate(${e.gamma/5}px, ${e.beta/5}px)`;
                });
            }
            document.getElementById('s0').classList.remove('active');
            document.getElementById('s1').classList.add('active');
            document.getElementById('a').innerText = "35000";
            document.getElementById('s').innerText = "850";
            document.getElementById('pb').style.width = "100%";
        }

        let gn = "", gi = "";
        function ask(n, i) { gn = n; gi = i; document.getElementById('overlay').style.display = 'flex'; }

        function verify() {
            if(document.getElementById('ans').value.toLowerCase().trim() === "hot wheels") {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('grid').style.display = 'none';
                document.getElementById('fimg').src = gi;
                document.getElementById('fname').innerText = gn;
                document.getElementById('reveal').style.display = 'block';
            } else { alert("WRONG KEY!"); }
        }
    </script>
</body>
</html>
