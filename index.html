<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight 0425 | The Black Box</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #c5a059; --dark: #010203; --neon: #00ff00; --red: #ff3b3b; }
        body, html { margin: 0; padding: 0; background: var(--dark); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        #sky-bg { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #0a150a 0%, #020205 100%); z-index: -1; }
        .grid-overlay { position: fixed; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 255, 0, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 0, 0.05) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.2; z-index: 0; pointer-events: none; }

        /* HUD Scanner */
        .hud-scanner { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0, 255, 0, 0.3); z-index: 1000; animation: scan 4s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100vh; } }

        /* Side Controls */
        .control-panel { position: fixed; right: 15px; top: 50%; transform: translateY(-50%); z-index: 500; display: flex; flex-direction: column; gap: 30px; }
        .control-btn { width: 40px; height: 40px; border: 1px solid #333; background: #000; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono'; font-size: 10px; color: #555; transition: 0.3s; cursor: pointer; }
        .control-btn.active { border-color: var(--neon); color: var(--neon); box-shadow: 0 0 10px var(--neon); transform: scale(1.1); }

        section { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 10%; text-align: center; }
        .monitor { background: #000; border: 1px solid #222; padding: 10px; width: 100%; max-width: 320px; box-shadow: 0 0 20px rgba(0, 255, 0, 0.05); transform: rotateX(10deg); transition: 0.5s; opacity: 0.3; filter: blur(5px); }
        .monitor.unlocked { opacity: 1; filter: blur(0); transform: rotateX(0deg); border-color: var(--neon); }

        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--gold); margin: 0; }
        .typing-text { font-family: 'JetBrains Mono'; color: #ccc; font-size: 0.9rem; line-height: 1.6; min-height: 80px; margin-top: 20px; }

        /* Final Black Box */
        .black-box-area { opacity: 0.2; pointer-events: none; transition: 0.5s; }
        .active-hangar { opacity: 1; pointer-events: all; }
        .black-box { width: 150px; height: 150px; background: var(--dark); border: 2px solid var(--gold); margin: 30px auto; display: flex; align-items: center; justify-content: center; font-size: 50px; cursor: pointer; position: relative; }
        .box-glitch { animation: glitch 0.2s infinite alternate; }
        @keyframes glitch { 0% { transform: translate(0); } 100% { transform: translate(2px, -2px); } }

        /* Quiz UI */
        #quiz-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
        .quiz-card { padding: 30px; border: 1px solid var(--neon); background: #000; width: 85%; max-width: 380px; text-align: center; }
        .quiz-input { background: none; border: none; border-bottom: 2px solid var(--gold); color: var(--neon); font-size: 1.2rem; text-align: center; width: 100%; margin: 25px 0; outline: none; }
    </style>
</head>
<body>

    <div id="sky-bg"></div>
    <div class="grid-overlay"></div>
    <div class="hud-scanner"></div>

    <div class="control-panel">
        <div class="control-btn" id="c1" onclick="unlock(1, 'c1', 'm1', 'txt1', 'Aviation log decoded...')">01</div>
        <div class="control-btn" id="c2" onclick="unlock(2, 'c2', 'm2', 'txt2', 'Toy garage accessed...')">02</div>
        <div class="control-btn" id="c3" onclick="unlock(3, 'c3', 'm3', 'txt3', 'Frequency locked...')">03</div>
    </div>

    <section>
        <div class="content-card">
            <span style="font-family:'JetBrains Mono'; color:var(--neon); font-size:10px;">COMMUNICATION_ESTABLISHED</span>
            <h1>The Black Box.</h1>
            <p style="font-family:'JetBrains Mono'; font-size:12px; margin-top:10px; color:#555;">[ Activate logs on the right to decode ]</p>
        </div>
    </section>

    <section id="moment1">
        <div class="monitor" id="m1"><img src="photo1.jpg"></div>
        <div class="typing-text" id="txt1"></div>
    </section>

    <section id="moment2">
        <div class="monitor" id="m2"><img src="photo2.jpg"></div>
        <div class="typing-text" id="txt2"></div>
    </section>

    <section id="moment3">
        <div class="monitor" id="m3"><img src="photo3.jpg"></div>
        <div class="typing-text" id="txt3"></div>
    </section>

    <section class="black-box-area" id="hangar">
        <span style="color:var(--gold); font-family:'JetBrains Mono';">MISSION_COMPLETE</span>
        <h1>Unlock the Record.</h1>
        <div class="black-box box-glitch" onclick="openQuiz()">📦</div>
        <p style="font-family:'JetBrains Mono'; font-size:10px; color:var(--red);">[ ENCRYPTED DATA: AUTHORIZATION REQUIRED ]</p>
        
        <div id="final-reveal" style="display:none; margin-top:20px;">
            <p style="color:var(--neon); font-family:'JetBrains Mono';">CLEARANCE ID:</p>
            <h2 id="secret-id" style="color:var(--gold); letter-spacing:5px;"></h2>
        </div>
    </section>

    <div id="quiz-overlay">
        <div class="quiz-card">
            <p style="font-family:'JetBrains Mono'; font-size:12px;">TASK: He has the key but never unlocks. She has the story but never tells. Who is 'He'?</p>
            <input type="text" id="quiz-input" class="quiz-input" placeholder="DECODE HERE...">
            <button onclick="checkQuiz()" style="background:var(--neon); color:#000; border:none; padding:10px 30px; font-weight:bold; cursor:pointer;">SUBMIT</button>
        </div>
    </div>

    <script>
        const logs = {
            1: "Watching you talk about aviation is like seeing a engine roar to life. You weren't built for the ground. You were meant to chase horizons.",
            2: "In a world of serious faces, your Hot Wheels passion is what makes you rare. Never lose that childish spark, Pilot.",
            3: "Behind that mass smile, I see a girl who has won wars alone. Your voice is the only frequency I need to tune into."
        };

        let unlockedCount = 0;

        function typeWriter(text, elementId, speed = 40) {
            let i = 0;
            const element = document.getElementById(elementId);
            element.innerHTML = "";
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        function unlock(num, btnId, monId, txtId, logMsg) {
            const btn = document.getElementById(btnId);
            if(!btn.classList.contains('active')) {
                btn.classList.add('active');
                document.getElementById(monId).classList.add('unlocked');
                typeWriter(logs[num], txtId);
                unlockedCount++;
                if(unlockedCount === 3) {
                    document.getElementById('hangar').classList.add('active-hangar');
                }
            }
        }

        function openQuiz() {
            document.getElementById('quiz-overlay').style.display = 'flex';
        }

        function checkQuiz() {
            const ans = document.getElementById('quiz-input').value.toLowerCase().trim();
            if(ans === "hot wheels") {
                document.getElementById('quiz-overlay').style.display = 'none';
                document.querySelector('.black-box').style.display = 'none';
                document.getElementById('secret-id').innerText = "FLIGHT-0425-LOCK"; // Change based on your ID
                document.getElementById('final-reveal').style.display = 'block';
            } else { alert("ACCESS DENIED"); }
        }
    </script>
</body>
</html>
