<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight 0425 | The Odyssey</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #c5a059; --dark: #020308; --neon: #00f3ff; --action: #ff0055; --radar: rgba(0, 255, 65, 0.2); }
        body, html { margin: 0; padding: 0; background: var(--dark); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* 3D Sky & Flying Plane */
        #sky-canvas { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle at center, #0a1a2f 0%, #010208 100%); z-index: -1; }
        .cloud { position: fixed; font-size: 100px; opacity: 0.1; z-index: -1; pointer-events: none; filter: blur(8px); }
        .hero-plane { position: fixed; font-size: 60px; z-index: 1; pointer-events: none; filter: drop-shadow(0 0 15px var(--neon)); transition: 0.3s; top: 20%; left: -10%; }

        /* HUD Scanner */
        .hud-scanner { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: var(--neon); box-shadow: 0 0 15px var(--neon); z-index: 1000; animation: scan 6s linear infinite; opacity: 0.4; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100vh; } }

        section { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 10%; position: relative; }
        
        /* Monitor Frames */
        .monitor-3d { background: rgba(0, 0, 0, 0.9); border: 2px solid var(--neon); padding: 10px; border-radius: 5px; box-shadow: 0 0 40px rgba(0, 243, 255, 0.2); transform: perspective(1000px) rotateY(-10deg); opacity: 0; transition: 1s; }
        .monitor-3d.active { opacity: 1; transform: rotateY(0deg); }
        .monitor-3d img { width: 100%; max-width: 320px; border-radius: 3px; }

        .story-card { max-width: 600px; text-align: center; margin-top: 30px; opacity: 0; transform: translateY(30px); }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; color: var(--neon); letter-spacing: 5px; text-shadow: 0 0 10px var(--neon); }
