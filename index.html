<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight 0425</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=JetBrains+Mono&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">

<style>
:root { --neon:#00f3ff; --gold:#c5a059; --dark:#010208; }

body {
margin:0;
background:var(--dark);
color:white;
font-family:'JetBrains Mono';
overflow:hidden;
}

/* SKY */
#sky {
position:fixed;
width:120%;
height:120%;
top:-10%;
left:-10%;
background: radial-gradient(circle at 30% 30%, #0f2027, #203a43, #000);
z-index:-1;
}

.star {
position:absolute;
width:2px;
height:2px;
background:white;
animation: twinkle 3s infinite alternate;
}

@keyframes twinkle {
from {opacity:0.2;}
to {opacity:1;}
}

/* HUD */
.hud {
position:fixed;
top:10px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
color:var(--neon);
font-size:12px;
}

.progress {
position:fixed;
top:0;
left:0;
height:3px;
width:0%;
background:var(--neon);
}

/* SECTIONS */
section {
height:100vh;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.active {
display:flex;
animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
from {opacity:0; transform:translateY(40px);}
to {opacity:1;}
}

h1 { font-family:'Orbitron'; letter-spacing:4px; }

/* IMAGE */
.frame {
border:2px solid var(--neon);
padding:8px;
border-radius:10px;
margin-bottom:20px;
max-width:260px;
}

.frame img { width:100%; border-radius:8px; }

/* TEXT */
.text {
margin:20px;
max-width:500px;
line-height:1.6;
color:#ccc;
}

/* BUTTON */
button {
border:1px solid var(--neon);
background:none;
color:var(--neon);
padding:10px 25px;
cursor:pointer;
}

/* HANGAR */
.grid {
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.box {
padding:30px;
border:2px solid #333;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

.box:hover {
transform:scale(1.05);
box-shadow:0 0 20px var(--neon);
}

/* FINAL */
#final {
display:none;
margin-top:30px;
}

#final img {
opacity:0;
animation: imgFade 2s forwards;
}

@keyframes imgFade {
to {opacity:1; transform:scale(1.05);}
}

.final-line {
font-family:'Playfair Display';
margin-top:20px;
opacity:0;
animation: fadeFinal 2s forwards;
animation-delay:1s;
}

@keyframes fadeFinal {
to {opacity:1;}
}

/* OVERLAY */
#overlay {
display:none;
position:fixed;
width:100%;
height:100%;
background:black;
justify-content:center;
align-items:center;
}

.card {
border:2px solid var(--gold);
padding:30px;
text-align:center;
}

input {
width:100%;
margin:20px 0;
background:none;
border:none;
border-bottom:1px solid var(--neon);
color:white;
text-align:center;
font-size:20px;
}
</style>
</head>

<body>

<div id="sky"></div>

<div class="hud">
<span>ALT: <span id="alt">0</span></span>
<span>SPD: <span id="spd">0</span></span>
</div>

<div class="progress" id="bar"></div>

<!-- BACKGROUND MUSIC -->
<audio id="bgm" loop>
<source src="music.mp3">
</audio>

<!-- VOICE NOTE (READY FOR LATER) -->
<audio id="voiceNote">
<source src="voice.mp3">
</audio>

<!-- START -->
<section class="active" id="s0">
<h1>MISSION 0425</h1>
<p class="text">System initialized...</p>
<button onclick="start()">INITIATE</button>
</section>

<!-- LOG1 -->
<section id="s1">
<div class="frame">
<img src="photo1.jpg">
</div>
<p class="text" id="t1"></p>
<button onclick="next(2)">NEXT</button>
</section>

<!-- LOG2 -->
<section id="s2">
<div class="frame">
<img src="photo2.jpg">
</div>
<p class="text" id="t2"></p>
<button onclick="next(3)">HANGAR</button>
</section>

<!-- HANGAR -->
<section id="s3">
<h1>CHOOSE</h1>

<div class="grid">
<div class="box" onclick="pick('RC Car')">🏎️</div>
<div class="box" onclick="pick('Teddy')">🧸</div>
<div class="box" onclick="pick('Dress')">👗</div>
<div class="box" onclick="pick('Shoes')">👡</div>
</div>

<!-- FINAL -->
<div id="final">

<div class="frame">
<img src="photo3.jpg">
</div>

<h2 id="result"></h2>

<p class="final-line">
"Out of everything in this world...  
I still chose to make you smile."
</p>

</div>

</section>

<!-- AUTH -->
<div id="overlay">
<div class="card">
<p>
He collects speed but never races.<br>
He owns stories but never tells.<br>
Who is he?
</p>
<input id="ans">
<button onclick="check()">UNLOCK</button>
</div>
</div>

<script>
let texts=[
"",
"Watching you talk about aviation feels like watching the sky itself.",
"Your voice is the only frequency I want."
];

function start(){
document.getElementById("bgm").play();
next(1);
}

function next(n){
document.querySelector(".active").classList.remove("active");
document.getElementById("s"+n).classList.add("active");

document.getElementById("alt").innerText=n*15000;
document.getElementById("spd").innerText=n*300;
document.getElementById("bar").style.width=(n*33)+"%";

type("t"+n,texts[n]);
}

function type(id,txt){
let el=document.getElementById(id);
el.innerText="";
let i=0;
function t(){
if(i<txt.length){
el.innerText+=txt[i];
i++;
setTimeout(t,30+Math.random()*40);
}
}
t();
}

let choice="";

function pick(c){
choice=c;
document.getElementById("overlay").style.display="flex";
}

function check(){
let val=document.getElementById("ans").value.toLowerCase();

if(val==="hot wheels"){
document.getElementById("overlay").style.display="none";
document.getElementById("result").innerText="You chose: "+choice;
document.getElementById("final").style.display="block";

/* VOICE NOTE PLAY */
setTimeout(()=>{
document.getElementById("voiceNote").play().catch(()=>{});
},1500);

}else{
alert("ACCESS DENIED");
}
}

/* stars */
let sky=document.getElementById("sky");
for(let i=0;i<80;i++){
let s=document.createElement("div");
s.className="star";
s.style.top=Math.random()*100+"%";
s.style.left=Math.random()*100+"%";
sky.appendChild(s);
}
</script>

</body>
</html>
